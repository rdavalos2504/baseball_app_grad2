<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baseball Stats</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <div class="header-bar"></div>
        <div class="header-content">
            <h1>Baseball Stats</h1>
            <p class="tagline">Historical Statistics & Records</p>
        </div>
        <div class="header-bar"></div>
    </header>

    <main>
        <section class="selector-panel">
            <h2>Select a Season</h2>
            <div class="dropdown-wrapper">
                <select id="year-select" disabled>
                    <option value="">Loading years...</option>
                </select>
            </div>
        </section>

        <section id="teams-panel" class="teams-panel" hidden>
            <div id="teams-container"></div>
        </section>

        <section id="players-panel" class="players-panel" hidden>
            <h2 id="players-heading"></h2>
            <ul id="players-list"></ul>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Baseball Stats</p>
    </footer>

    <script src="/script.js"></script>
</body>
</html>
